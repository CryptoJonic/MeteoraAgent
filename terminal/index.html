<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1020" />
  <title>Galka Terminal</title>
  <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root{color-scheme:dark;--bg:#070b14;--panel:#0f1627;--line:#27334a;--text:#e9eef9;--muted:#8f9bb3;--accent:#65a7ff;--good:#36c98f;--bad:#ff6b78;--warn:#ffba5c}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.4 system-ui,sans-serif}button,input,select{font:inherit}
    header{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:12px;background:#0a1020;border-bottom:1px solid var(--line)}
    h1{font-size:17px;margin:0}.sub{font-size:12px;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}
    button,.file{border:1px solid #33425f;background:#16223a;color:var(--text);border-radius:8px;padding:9px 11px;cursor:pointer}.primary{background:#1c4f87}.file input{display:none}
    .meta{display:grid;grid-template-columns:repeat(6,minmax(100px,1fr));gap:8px;padding:10px;background:#0b1221;border-bottom:1px solid var(--line)}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px}.label{font-size:11px;color:var(--muted);text-transform:uppercase}.value{font-weight:700;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .workspace{display:grid;grid-template-columns:minmax(0,1fr) 360px;min-height:calc(100vh - 132px)}.chart-panel{position:relative;min-height:560px;border-right:1px solid var(--line)}#chart{position:absolute;inset:0}
    aside{background:var(--panel);display:grid;grid-template-rows:auto auto minmax(0,1fr);min-height:0}.status{padding:10px;border-bottom:1px solid var(--line);white-space:pre-wrap;color:var(--muted)}.status.error{color:var(--bad)}.status.warn{color:var(--warn)}
    .filters{padding:9px;border-bottom:1px solid var(--line);display:flex;gap:7px}select{width:100%;background:#0b1221;color:var(--text);border:1px solid #33425f;border-radius:7px;padding:8px}
    .list{overflow:auto}.trade{padding:10px;border-bottom:1px solid #202b40;cursor:pointer}.trade:hover,.trade.active{background:#131d31}.head{display:flex;justify-content:space-between;font-weight:700}.good{color:var(--good)}.bad{color:var(--bad)}.details{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;margin-top:5px;font-size:12px;color:var(--muted)}
    .empty{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}.empty div{background:rgba(15,22,39,.95);border:1px dashed #3a4b6b;border-radius:12px;padding:22px;text-align:center;max-width:520px}
    @media(max-width:900px){header{align-items:flex-start}.meta{grid-template-columns:repeat(3,1fr)}.workspace{grid-template-columns:1fr;grid-template-rows:58vh 420px}.chart-panel{min-height:0;border-right:0;border-bottom:1px solid var(--line)}}
    @media(max-width:560px){header{flex-direction:column}.meta{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header>
  <div><h1>Galka Terminal</h1><div class="sub">Визуальная проверка исторических сделок</div></div>
  <div class="actions">
    <button class="primary" id="btcBtn">Открыть BTC историю</button>
    <button id="demoBtn">Демо</button>
    <label class="file">Загрузить файл<input id="fileInput" type="file" accept=".zip,.json,.galka.zip,.galka.json" /></label>
  </div>
</header>
<section class="meta" id="meta"></section>
<main class="workspace">
  <section class="chart-panel"><div id="chart"></div><div class="empty" id="empty"><div><b>Нажмите «Открыть BTC историю»</b><br>Архив уже находится в репозитории и загрузится без выбора файла на телефоне.</div></div></section>
  <aside>
    <div class="status" id="status">Терминал готов.</div>
    <div class="filters"><select id="resultFilter"><option value="all">Все сделки</option><option value="win">Прибыльные</option><option value="loss">Убыточные</option></select><select id="sampleFilter"><option value="all">Вся история</option><option value="final_oos">Только final OOS</option></select></div>
    <div class="list" id="tradeList"></div>
  </aside>
</main>
<script>
(()=>{
'use strict';
const HISTORY='../results/BTCUSDT_15m_dual_failure_v5.galka.zip';
const $=id=>document.getElementById(id);
const el={meta:$('meta'),status:$('status'),empty:$('empty'),list:$('tradeList'),file:$('fileInput'),btc:$('btcBtn'),demo:$('demoBtn'),result:$('resultFilter'),sample:$('sampleFilter'),chart:$('chart')};
const state={data:null,chart:null,series:null,markerApi:null,lines:[],active:null};
const num=(v,d=0)=>{const n=Number(v);return Number.isFinite(n)?n:d};
const ts=v=>{if(v===null||v===undefined||v==='')return null;if(typeof v==='number')return Math.floor(v>1e12?v/1000:v);const s=String(v);if(/^\d+(\.\d+)?$/.test(s)){const n=Number(s);return Math.floor(n>1e12?n/1000:n)}const n=Date.parse(s);if(!Number.isFinite(n))throw new Error('Некорректное время: '+v);return Math.floor(n/1000)};
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function status(text,type=''){el.status.textContent=text;el.status.className='status '+type}
function csvLine(line){const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if(c===','&&!q){out.push(cur);cur=''}else cur+=c}out.push(cur);return out}
function csv(text){const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(x=>x.trim());if(!lines.length)return[];const h=csvLine(lines[0]);return lines.slice(1).map(line=>{const v=csvLine(line);return Object.fromEntries(h.map((k,i)=>[k,v[i]??'']))})}
async function parseZip(input){if(!window.JSZip)throw new Error('JSZip не загрузился. Нужен интернет при первом открытии терминала.');const z=await JSZip.loadAsync(input);const m=z.file('manifest.json');if(!m)throw new Error('В архиве нет manifest.json');const manifest=JSON.parse(await m.async('string'));const f=manifest.files||{};const readCsv=async(name,optional=false)=>{const x=z.file(name);if(!x){if(optional)return[];throw new Error('В архиве нет '+name)}return csv(await x.async('string'))};const readJson=async(name)=>{const x=z.file(name);return x?JSON.parse(await x.async('string')):{}};return{manifest,candles:await readCsv(f.candles||'candles.csv'),patterns:await readCsv(f.patterns||'patterns.csv'),orders:await readCsv(f.orders||'orders.csv'),trades:await readCsv(f.trades||'trades.csv'),summary:await readJson(f.summary||'summary.json'),parameters:await readJson(f.parameters||'parameters.json')}}
function normalize(r){return{manifest:r.manifest||{},summary:r.summary||{},parameters:r.parameters||{},candles:(r.candles||[]).map(c=>({time:ts(c.time),open:num(c.open),high:num(c.high),low:num(c.low),close:num(c.close)})).sort((a,b)=>a.time-b.time),patterns:(r.patterns||[]).map(p=>({...p,pattern_id:String(p.pattern_id),v_low_time:ts(p.v_low_time),break_time:ts(p.break_time),v_low_price:num(p.v_low_price),break_price:num(p.break_price),depth_limit_price:num(p.depth_limit_price),target_price:num(p.target_price||p.v_low_price)})),orders:(r.orders||[]).map(o=>({...o,order_id:String(o.order_id),trade_id:String(o.trade_id),pattern_id:String(o.pattern_id),time:ts(o.time),price:num(o.price),quantity:num(o.quantity),fee:num(o.fee),level:num(o.level)})),trades:(r.trades||[]).map(t=>({...t,trade_id:String(t.trade_id),pattern_id:String(t.pattern_id),entry_time:ts(t.entry_time),exit_time:ts(t.exit_time),average_entry:num(t.average_entry),exit_price:num(t.exit_price),net_pnl:num(t.net_pnl),net_pnl_pct:num(t.net_pnl_pct),max_planned_loss:num(t.max_planned_loss),result:String(t.result||'open').toLowerCase()}))}}
function init(){if(state.chart)return;if(!window.LightweightCharts)throw new Error('Графический модуль не загрузился.');state.chart=LightweightCharts.createChart(el.chart,{autoSize:true,layout:{background:{type:'solid',color:'#070b14'},textColor:'#a8b3c7'},grid:{vertLines:{color:'#172033'},horzLines:{color:'#172033'}},timeScale:{timeVisible:true,secondsVisible:false,rightOffset:8,barSpacing:7},rightPriceScale:{borderColor:'#27334a'},handleScroll:{mouseWheel:true,pressedMouseMove:true,horzTouchDrag:true},handleScale:{mouseWheel:true,pinch:true}});state.series=state.chart.addSeries(LightweightCharts.CandlestickSeries,{upColor:'#36c98f',downColor:'#ff6b78',borderVisible:false,wickUpColor:'#36c98f',wickDownColor:'#ff6b78',priceLineVisible:false})}
function money(v){return num(v).toFixed(2)+' '+(state.data?.manifest?.currency||'USDT')}function price(v){return num(v).toFixed(num(state.data?.manifest?.price_precision,2))}function date(v){return v?new Date(v*1000).toLocaleString('ru-RU',{timeZone:'UTC'})+' UTC':'—'}
function cards(){const d=state.data,s=d.summary||{},closed=d.trades.filter(t=>t.result!=='open'),wins=closed.filter(t=>t.net_pnl>0).length,wr=s.win_rate!=null?num(s.win_rate)*(num(s.win_rate)<=1?100:1):(closed.length?wins/closed.length*100:0);const values=[['Инструмент',(d.manifest.symbol||'—')+' · '+(d.manifest.timeframe||'—')],['Модель',d.manifest.strategy_version||d.manifest.strategy||'Galka'],['Свечей',d.candles.length.toLocaleString('ru-RU')],['Сделок',String(d.trades.length)],['Win rate',wr.toFixed(2)+'%'],['Net PnL',money(s.net_pnl??d.trades.reduce((a,t)=>a+t.net_pnl,0))]];el.meta.innerHTML=values.map(([a,b])=>`<div class="card"><div class="label">${esc(a)}</div><div class="value">${esc(b)}</div></div>`).join('')}
function filtered(){return state.data.trades.filter(t=>(el.result.value==='all'||t.result===el.result.value)&&(el.sample.value==='all'||String(t.sample_role||t.fold||'').toLowerCase().includes('oos')))}
function trades(){const a=filtered();el.list.innerHTML=a.length?a.map(t=>`<div class="trade ${state.active===t.trade_id?'active':''}" data-id="${esc(t.trade_id)}"><div class="head"><span>#${esc(t.trade_id)}</span><span class="${t.net_pnl>=0?'good':'bad'}">${t.net_pnl>=0?'+':''}${esc(money(t.net_pnl))}</span></div><div class="details"><span>Вход</span><span>${esc(price(t.average_entry))}</span><span>Выход</span><span>${esc(price(t.exit_price))}</span><span>Результат</span><span>${esc(t.result)}</span><span>Время</span><span>${esc(date(t.entry_time))}</span></div></div>`).join(''):'<div class="trade"><span class="sub">Сделок по фильтру нет.</span></div>';el.list.querySelectorAll('[data-id]').forEach(x=>x.onclick=()=>select(x.dataset.id))}
function clearLines(){state.lines.forEach(x=>{try{state.series.removePriceLine(x)}catch(_){}});state.lines=[]}function line(v,color,title){if(v>0)state.lines.push(state.series.createPriceLine({price:v,color,lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:true,title}))}
function select(id){const t=state.data.trades.find(x=>x.trade_id===id);if(!t)return;const p=state.data.patterns.find(x=>x.pattern_id===t.pattern_id);const os=state.data.orders.filter(x=>x.trade_id===id);state.active=id;trades();clearLines();if(p){line(p.v_low_price,'#65a7ff','V-low');line(p.depth_limit_price,'#ff6b78','Последняя лимитка');line(p.target_price,'#ffba5c','Цель')}line(t.average_entry,'#36c98f','Средний вход');line(t.exit_price,t.net_pnl>=0?'#65a7ff':'#ff6b78','Выход');const markers=[];if(p){markers.push({time:p.v_low_time,position:'belowBar',color:'#65a7ff',shape:'circle',text:'V-low'});markers.push({time:p.break_time,position:'aboveBar',color:'#ffba5c',shape:'arrowDown',text:'Пробой'})}os.filter(o=>['filled','partial'].includes(String(o.status).toLowerCase())).forEach(o=>markers.push({time:o.time,position:o.side==='buy'?'belowBar':'aboveBar',color:o.side==='buy'?'#36c98f':'#ff6b78',shape:o.side==='buy'?'arrowUp':'arrowDown',text:(o.side==='buy'?'Buy ':'Sell ')+price(o.price)}));if(t.exit_time)markers.push({time:t.exit_time,position:'aboveBar',color:t.net_pnl>=0?'#65a7ff':'#ff6b78',shape:'square',text:'Exit '+money(t.net_pnl)});markers.sort((a,b)=>a.time-b.time);if(state.markerApi)state.markerApi.setMarkers([]);state.markerApi=LightweightCharts.createSeriesMarkers(state.series,markers);const start=p?.v_low_time||t.entry_time,end=t.exit_time||start+86400,span=Math.max(3600,end-start);state.chart.timeScale().setVisibleRange({from:start-span*.4,to:end+span*.4});status(`Сделка #${t.trade_id}\nВход ${price(t.average_entry)} · выход ${price(t.exit_price)} · PnL ${money(t.net_pnl)}`)}
async function load(raw,name){status('Подготовка графика…');state.data=normalize(raw);if(!state.data.candles.length)throw new Error('В файле нет свечей');init();state.series.setData(state.data.candles);state.active=null;clearLines();if(state.markerApi)state.markerApi.setMarkers([]);cards();trades();el.empty.style.display='none';state.chart.timeScale().fitContent();status(`Загружен: ${name}\n${state.data.trades.length} сделок, ${state.data.patterns.length} галок`)}
async function openBundled(){try{status('Загрузка BTC-истории из репозитория…');const r=await fetch(HISTORY,{cache:'no-store'});if(!r.ok)throw new Error('Файл не найден. Выполните git pull в Termux.');await load(await parseZip(await r.arrayBuffer()),'BTCUSDT 15m — GitHub')}catch(e){console.error(e);status(e.message||String(e),'error')}}
function demo(){const start=Date.UTC(2026,0,1)/1000,c=[];let last=100;for(let i=0;i<140;i++){const close=100+Math.sin(i/11)*3+(i>50&&i<75?-(i-50)*.18:0);c.push({time:start+i*900,open:last,high:Math.max(last,close)+.4,low:Math.min(last,close)-.4,close});last=close}return{manifest:{schema_version:'1.0',strategy:'Galka demo',symbol:'BTCUSDT',timeframe:'15m',currency:'USDT',price_precision:2},candles:c,patterns:[{pattern_id:'P1',v_low_time:c[60].time,v_low_price:c[60].low,break_time:c[75].time,break_price:c[75].low,depth_limit_price:c[80].low,target_price:c[60].low}],orders:[{order_id:'O1',trade_id:'T1',pattern_id:'P1',time:c[78].time,side:'buy',price:c[78].close,quantity:1,status:'filled',level:1}],trades:[{trade_id:'T1',pattern_id:'P1',entry_time:c[78].time,exit_time:c[105].time,average_entry:c[78].close,exit_price:c[105].close,net_pnl:c[105].close-c[78].close,net_pnl_pct:1,max_planned_loss:5,result:'win'}],summary:{trades:1,win_rate:1,net_pnl:2}}}
el.btc.onclick=openBundled;el.demo.onclick=()=>load(demo(),'демо').catch(e=>status(e.message,'error'));el.file.onchange=async e=>{const f=e.target.files?.[0];if(!f)return;try{status('Чтение '+f.name+'…');const raw=f.name.toLowerCase().endsWith('.zip')?await parseZip(f):JSON.parse(await f.text());await load(raw,f.name)}catch(x){status(x.message||String(x),'error')}finally{e.target.value=''}};el.result.onchange=trades;el.sample.onchange=trades;el.meta.innerHTML=['Инструмент','Модель','Свечей','Сделок','Win rate','Net PnL'].map(x=>`<div class="card"><div class="label">${x}</div><div class="value">—</div></div>`).join('');
})();
</script>
</body>
</html>

name: Apply Reclaim Trailing

on:
  push:
    paths:
      - 'ops/reclaim-trailing-plan.md'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply patch
        run: python scripts/apply_reclaim_trail.py
      - name: Validate
        run: npm run check
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal/pro.html terminal/pro.css terminal/pro.js scripts/check-pro-terminal.mjs docs/RECLAIM_TRAILING_EXIT.md
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Add reclaim trailing exit to Galka Pro"
          git push origin HEAD:main

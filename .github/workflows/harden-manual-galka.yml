name: Harden Manual Galka
on:
  push:
    branches: [feat/manual-galka-v1]
    paths: [.github/workflows/harden-manual-galka.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/manual-galka-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply guards
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('terminal/pro.js');s=p.read_text()
          def rep(a,b,n):
            global s
            if s.count(a)!=1: raise SystemExit(f'{n}: {s.count(a)}')
            s=s.replace(a,b,1)
          rep("  els.drawingCanvas.classList.toggle('drawing',tool!=='cursor'&&tool!=='crosshair'&&!store.ui.drawingsLocked);","  els.drawingCanvas.classList.toggle('drawing',tool==='manualGalka'||(tool!=='cursor'&&tool!=='crosshair'&&!store.ui.drawingsLocked));",'canvas lock')
          rep("  if(['cursor','crosshair'].includes(runtime.tool)||store.ui.drawingsLocked)return;","  if(['cursor','crosshair'].includes(runtime.tool)||(store.ui.drawingsLocked&&runtime.tool!=='manualGalka'))return;",'drawing lock')
          rep("  if(active?.qty){toast('Сначала закрой открытую позицию по этой монете','error');setTool('cursor');return;}\n  if(active?.trainingExampleId)","  if(active?.qty){toast('Сначала закрой открытую позицию по этой монете','error');setTool('cursor');return;}\n  const firstEntry=p.price*(1-clamp(num(store.paper.settings.ladderStepPct,.15),.05,2)/100),ask=runtime.quotes[symbol].ask;\n  if(ask&&ask<=firstEntry){toast('Поздно ставить уровень: цена уже ниже первой лимитки','error');setTool('cursor');return;}\n  if(active?.trainingExampleId)",'late level guard')
          p.write_text(s)
          PY
          npm run check
      - name: Commit guards
        run: |
          rm .github/workflows/harden-manual-galka.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Guard manual Galka selection"
          git push origin HEAD:feat/manual-galka-v1

name: Galka Hyperliquid Live

on:
  push:
    branches:
      - agent/galka-live-hyperliquid
    paths:
      - 'live/**'
      - 'terminal/live.*'
      - 'scripts/setup-galka-live.sh'
      - 'scripts/start-galka-live.sh'
      - 'scripts/check-live-secret-isolation.mjs'
      - 'tests/test_live_*.py'
      - '.github/workflows/galka-live-hyperliquid.yml'
  pull_request:
    paths:
      - 'live/**'
      - 'terminal/live.*'
      - 'scripts/setup-galka-live.sh'
      - 'scripts/start-galka-live.sh'
      - 'scripts/check-live-secret-isolation.mjs'
      - 'tests/test_live_*.py'
      - '.github/workflows/galka-live-hyperliquid.yml'
  workflow_dispatch:

jobs:
  python-live:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -r live/requirements-termux.txt
      - name: Verify pinned dependency set
        run: |
          python - <<'PY'
          from importlib.metadata import PackageNotFoundError, version
          import eth_account, eth_utils, hyperliquid
          assert version('hyperliquid-python-sdk') == '0.24.0'
          assert version('eth-account') == '0.10.0'
          assert version('eth-utils') == '4.1.1'
          try:
              version('pydantic-core')
          except PackageNotFoundError:
              pass
          else:
              raise SystemExit('pydantic-core unexpectedly installed')
          print('Pinned SDK dependency set verified')
          PY
      - run: python -m compileall -q live tests/test_live_ladder.py tests/test_live_engine.py
      - run: python -m unittest tests.test_live_ladder tests.test_live_engine -v

  browser-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check terminal/live.js
      - run: node scripts/check-live-secret-isolation.mjs
      - name: Check live API controls
        shell: bash
        run: |
          grep -q '/api/live/preview' terminal/live.js
          grep -q 'PLACE_REAL_ORDERS' terminal/live.js
          grep -q 'EMERGENCY_CLOSE_REAL_POSITION' terminal/live.js

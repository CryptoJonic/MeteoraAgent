name: Backtest Page Check
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture focused result
        run: |
          set +e
          node scripts/check-backtest-page.mjs > check.log 2>&1
          echo $? > check-status.txt
          cat check.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: backtest-page-check-log
          path: |
            check.log
            check-status.txt
          retention-days: 1

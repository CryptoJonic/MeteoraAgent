name: Build Galka Radar
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'feat/galka-radar'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: python3 scripts/apply-galka-radar.py
      - run: npm run check
      - name: Commit generated radar
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add terminal/pro.html terminal/pro.css terminal/pro.js scripts/check-pro-terminal.mjs
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add explainable Galka radar"
          git push origin HEAD:${{ github.head_ref }}
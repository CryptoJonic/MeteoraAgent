name: Apply Galka Level Editor Mobile UI
on:
  push:
    branches: [feat/galka-level-editor-mobile-ui]
    paths:
      - scripts/apply-galka-level-editor-mobile-ui.py
      - .github/workflows/apply-galka-level-editor-mobile-ui.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Apply interface patch
        run: python scripts/apply-galka-level-editor-mobile-ui.py
      - name: Validate terminal
        run: npm run check
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal/pro.html terminal/pro.css terminal/pro.js scripts/check-pro-terminal.mjs
          git diff --cached --quiet || git commit -m "Improve Galka level editing and mobile layout"
          git push

name: Apply Galka LIVE hardening v3

on:
  push:
    branches:
      - agent/galka-live-hardening-v3
    paths:
      - '.galka-hardening/READY'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: galka-live-hardening-v3
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/galka-live-hardening-v3
          fetch-depth: 0

      - name: Check staged payload
        id: gate
        shell: bash
        run: |
          if [[ -f .galka-hardening/READY ]]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
            echo 'Payload already applied; nothing to do.'
          fi

      - name: Reconstruct and verify patch
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat .galka-hardening/part-* > /tmp/patch.b64
          base64 --decode /tmp/patch.b64 > /tmp/patch.gz
          gzip -dc /tmp/patch.gz > /tmp/galka-live-hardening-v3.patch
          printf '%s  %s\n' \
            '98414f915ce0ff2aae06edb63ead566ffd51abe734d17edcf4c9db76396069d7' \
            '/tmp/galka-live-hardening-v3.patch' | sha256sum --check -

      - name: Apply hardened code
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          patch --batch --forward -p1 < /tmp/galka-live-hardening-v3.patch
          rm -rf .galka-hardening
          chmod +x \
            scripts/setup-galka-live.sh \
            scripts/start-galka-live.sh \
            scripts/verify-galka-live.sh \
            scripts/check-galka-live-account.sh

      - name: Static verification
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q live tests
          node --check terminal/live.js
          node --check terminal/vendor/galka-chart.js
          node scripts/check-live-secret-isolation.mjs
          node scripts/check-live-terminal.mjs
          bash -n scripts/setup-galka-live.sh
          bash -n scripts/start-galka-live.sh
          bash -n scripts/verify-galka-live.sh
          bash -n scripts/check-galka-live-account.sh

      - name: Commit hardened implementation
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Harden Galka Hyperliquid LIVE v3'
          git push origin HEAD:agent/galka-live-hardening-v3

name: Build manual Galka target mode

on:
  push:
    branches:
      - agent/manual-galka-auto-paper

permissions:
  contents: write

jobs:
  build-target-mode:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/manual-galka-auto-paper
          fetch-depth: 0

      - name: Apply target-only manual mode
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          # Separate research branch defaults to a simple exit exactly at GALKA.
          replace_once(
              'terminal/modules/store.js',
              "        exitMode: 'trail',\n        reclaimBufferPct: 0.1,",
              "        exitMode: 'target',\n        reclaimBufferPct: 0,",
          )

          pro = Path('terminal/pro.js')
          text = pro.read_text()
          text = text.replace(
              "const VERSION = 'pro-v2.0.1-paper-recovery';",
              "const VERSION = 'manual-auto-v1.1-galka-target';",
              1,
          )

          anchor = "let store=loadStore();\nconst defaultStore=createDefaultStore;"
          migration = """let store=loadStore();
// Manual Auto research mode: the user's GALKA is both the reference level and the exit target.
// This intentionally disables reclaim/trailing without touching the main galka-pro-v1 workspace.
let targetModeMigrated=false;
if(store.paper.settings.signalMode!=='manual'){store.paper.settings.signalMode='manual';targetModeMigrated=true;}
if(store.paper.settings.exitMode!=='target'){store.paper.settings.exitMode='target';targetModeMigrated=true;}
if(num(store.paper.settings.reclaimBufferPct)!==0){store.paper.settings.reclaimBufferPct=0;targetModeMigrated=true;}
for(const symbol of SYMBOLS){
  const campaign=store.paper.symbols[symbol]?.campaign;
  if(!campaign)continue;
  if(campaign.exitMode!=='target'||campaign.target!==campaign.vLow||campaign.reclaimPrice!=null||campaign.trailArmed){
    campaign.exitMode='target';campaign.target=campaign.vLow;campaign.reclaimPrice=null;
    campaign.trailArmed=false;campaign.trailHigh=null;campaign.trailStop=null;campaign.trailActivatedAt=null;
    if(campaign.qty)campaign.status='open';
    targetModeMigrated=true;
  }
}
if(targetModeMigrated)saveStore(store);
const defaultStore=createDefaultStore;
if(els.signalMode){els.signalMode.value='manual';els.signalMode.disabled=true;}
if(els.exitMode){els.exitMode.value='target';els.exitMode.disabled=true;}
for(const control of [els.reclaimBufferPct,els.trailDistancePct])control?.closest('label')?.classList.add('hidden');"""
          if anchor not in text:
              raise SystemExit('pro.js store anchor not found')
          text = text.replace(anchor, migration, 1)

          old_portfolio = "${campaign?.trailArmed?`Stop ${price(campaign.trailStop,item)}`:campaign?`Reclaim ${price(campaign.reclaimPrice,item)}`:'Можно поставить уровень'}"
          new_portfolio = "${campaign?`Выход GALKA ${price(campaign.target||campaign.vLow,item)}`:'Можно поставить уровень'}"
          if old_portfolio not in text:
              raise SystemExit('portfolio reclaim label not found')
          text = text.replace(old_portfolio, new_portfolio, 1)

          old_state = "els.botState.textContent=c?(c.status==='trailing'?'Трейлинг':c.status==='open'?'Позиция':'Лимитки'):p?'Галка выбрана':'Ожидание';"
          new_state = "els.botState.textContent=c?(c.qty?'Ждём возврат к GALKA':'Лимитки'):p?'Галка выбрана':'Ожидание';"
          if old_state not in text:
              raise SystemExit('bot state text not found')
          text = text.replace(old_state, new_state, 1)

          old_metrics = "<span><small>Reclaim</small><b>${price(c.reclaimPrice,symbol)}</b></span><span><small>Trail stop</small><b class=\"${c.trailArmed?'down':''}\">${price(c.trailStop,symbol)}</b></span>"
          new_metrics = "<span><small>Выход</small><b>${price(c.target||c.vLow,symbol)}</b></span><span><small>Режим</small><b>На GALKA</b></span>"
          if old_metrics not in text:
              raise SystemExit('campaign reclaim metrics not found')
          text = text.replace(old_metrics, new_metrics, 1)

          text = text.replace(
              "if(c.reclaimPrice)addPaperLine(c.reclaimPrice,COLORS.purple,'RECLAIM');",
              "if(c.exitMode==='trail'&&c.reclaimPrice)addPaperLine(c.reclaimPrice,COLORS.purple,'RECLAIM');",
              1,
          )
          text = text.replace(
              "if(p)markers.push({time:p.vLowTime,position:'belowBar',color:p.source==='manual'?COLORS.orange:COLORS.blue,shape:'circle',text:p.source==='manual'?'GALKA':'V-low'});",
              "if(p&&p.source!=='manual')markers.push({time:p.vLowTime,position:'belowBar',color:COLORS.blue,shape:'circle',text:'V-low'});",
              1,
          )
          text = text.replace(
              "s.signalMode=els.signalMode.value==='auto'?'auto':'manual';",
              "s.signalMode='manual';",
              1,
          )
          text = text.replace(
              "s.exitMode=els.exitMode.value==='target'?'target':'trail';s.reclaimBufferPct=clamp(num(els.reclaimBufferPct.value,.10),0,5);",
              "s.exitMode='target';s.reclaimBufferPct=0;",
              1,
          )
          pro.write_text(text)

          # Bust PWA/app-shell caches for this isolated version.
          replace_once('terminal/pro.html', 'pro.js?v=7', 'pro.js?v=8')
          sw = Path('terminal/sw.js')
          sw_text = sw.read_text().replace("galka-manual-auto-shell-v1", "galka-manual-auto-shell-v2", 1)
          sw_text = sw_text.replace("./pro.js?v=7", "./pro.js?v=8", 1)
          sw.write_text(sw_text)

          test = Path('scripts/test-manual-target-mode.mjs')
          test.write_text("""import assert from 'node:assert/strict';
import { createCampaign, processCampaignQuote } from '../terminal/modules/paper-engine.js';

const settings = {
  symbolNotional: 400,
  maxHours: 72,
  ladderStepPct: 0.15,
  manualDepthPct: 1.5,
  exitMode: 'target',
  reclaimBufferPct: 0,
  trailDistancePct: 0.75,
  makerFee: 0.0002,
};
const pattern = { patternId: 'manual-target', source: 'manual', vLow: 100 };
const campaign = createCampaign('BTCUSDT', pattern, settings, 1_000);
assert.equal(campaign.exitMode, 'target');
processCampaignQuote(campaign, { bid: 99.5, ask: 99.5 }, settings, 2_000);
assert.ok(campaign.qty > 0, 'ladder must fill below GALKA');
const result = processCampaignQuote(campaign, { bid: 100, ask: 100.01 }, settings, 3_000);
assert.equal(result.close?.reason, 'v_low_target');
assert.equal(result.close?.price, 100);
assert.equal(campaign.trailArmed, false);
console.log('Manual target mode: fills below GALKA and exits exactly at GALKA');
""")

          package = Path('package.json')
          package_text = package.read_text()
          needle = 'node scripts/test-paper-engine.mjs &&'
          if 'test-manual-target-mode.mjs' not in package_text:
              if needle not in package_text:
                  raise SystemExit('package check anchor not found')
              package_text = package_text.replace(needle, needle + ' node scripts/test-manual-target-mode.mjs &&', 1)
              package.write_text(package_text)
          PY

      - name: Validate
        run: npm run check

      - name: Commit generated target mode
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal/pro.js terminal/pro.html terminal/sw.js terminal/modules/store.js scripts/test-manual-target-mode.mjs package.json
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "feat: exit manual paper positions at Galka [manual-target-built]"
          git push origin HEAD:agent/manual-galka-auto-paper

name: Rebuild Bundled BTC History

on:
  push:
    branches: [main]
    paths:
      - ".github/REBUILD_BTC_HISTORY"

permissions:
  contents: write

concurrency:
  group: rebuild-btc-history
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: research/requirements.txt

      - name: Install research dependencies
        run: python -m pip install -r research/requirements.txt

      - name: Rebuild history from Binance
        run: |
          rm -f results/BTCUSDT_15m_dual_failure_v5.galka.zip
          python research/run_candidate.py \
            --output results/BTCUSDT_15m_dual_failure_v5.galka.zip

      - name: Verify binary archive
        run: |
          unzip -t results/BTCUSDT_15m_dual_failure_v5.galka.zip
          python - <<'PY'
          from pathlib import Path
          import hashlib, zipfile
          p = Path('results/BTCUSDT_15m_dual_failure_v5.galka.zip')
          assert p.stat().st_size > 1_000_000, p.stat().st_size
          assert zipfile.is_zipfile(p)
          with zipfile.ZipFile(p) as z:
              required = {'manifest.json','candles.csv','patterns.csv','orders.csv','trades.csv','summary.json','parameters.json'}
              assert required.issubset(z.namelist()), required - set(z.namelist())
              assert z.testzip() is None
          print('size_bytes=', p.stat().st_size)
          print('sha256=', hashlib.sha256(p.read_bytes()).hexdigest())
          PY

      - name: Commit verified archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/BTCUSDT_15m_dual_failure_v5.galka.zip
          if git diff --cached --quiet; then
            echo "Archive unchanged"
          else
            git commit -m "Rebuild verified BTC history archive [skip ci]"
            git push origin HEAD:main
          fi

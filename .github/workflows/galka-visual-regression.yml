name: Galka visual regression

on:
  push:
    branches:
      - 'agent/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install temporary visual test runtime
        run: npm install --no-save --ignore-scripts playwright@1.52.0
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify background paper recovery in Chromium
        run: node scripts/test-paper-recovery-browser.mjs
      - name: Prepare main baseline
        run: git worktree add /tmp/galka-main origin/main
      - name: Capture before and after
        run: node scripts/capture-galka-visuals.mjs --current-root . --baseline-root /tmp/galka-main --output artifacts/galka-visuals
      - uses: actions/upload-artifact@v4
        with:
          name: galka-visuals
          path: artifacts/galka-visuals/*.png
          if-no-files-found: error

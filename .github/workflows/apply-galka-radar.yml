name: Apply Galka Radar
on:
  push:
    branches: [feat/galka-radar]
    paths: [.github/workflows/apply-galka-radar.yml]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add explainable Galka radar
        run: |
          python3 - <<'PY'
          from pathlib import Path

          html_path=Path('terminal/pro.html')
          css_path=Path('terminal/pro.css')
          js_path=Path('terminal/pro.js')
          check_path=Path('scripts/check-pro-terminal.mjs')
          html=html_path.read_text()
          css=css_path.read_text()
          js=js_path.read_text()
          check=check_path.read_text()

          js=js.replace("const VERSION = 'pro-v1.4.0-clean-chart';", "const VERSION = 'pro-v1.5.0-galka-radar';")
          js=js.replace("'toggleTools','toggleSidebar','leftbar','sidebar','connectionDot','connectionText','tickerText','themeBtn','clock',", "'toggleTools','toggleSidebar','leftbar','sidebar','connectionDot','connectionText','tickerText','themeBtn','clock','radarBtn','radarLegend',")
          js=js.replace("drawings:{},templates:{},alerts:[]", "drawings:{},templates:{},alerts:[],radar:{enabled:false,minScore:45}")
          js=js.replace("hiddenLiveUpdates:false,manualDrag:false,manualDragOriginal:null", "hiddenLiveUpdates:false,manualDrag:false,manualDragOriginal:null,radarCandidates:[],radarSelected:null")
          js=js.replace("runtime.mainChart.subscribeCrosshairMove(onCrosshair);", "runtime.mainChart.subscribeCrosshairMove(onCrosshair);\n  runtime.mainChart.subscribeClick(onRadarChartClick);")

          radar_code=r'''
/* Explainable Galka radar. It highlights candidates only and never opens trades. */
function radarFeatureAt(rows,index){
  const L=4,R=4;if(index<L||index+R>=rows.length)return null;
  const cur=rows[index],window=rows.slice(index-L,index+R+1),minLow=Math.min(...window.map(x=>x.low));
  if(cur.low>minLow+Math.max(1e-12,Math.abs(cur.low)*1e-10))return null;
  const atr=atrValue(rows,index,14);if(!atr)return null;
  const leftRows=rows.slice(index-L,index),rightRows=rows.slice(index+1,index+R+1);
  const leftHigh=Math.max(...leftRows.map(x=>x.high)),rightHigh=Math.max(...rightRows.map(x=>x.high));
  const leftDepth=leftHigh-cur.low,rightDepth=rightHigh-cur.low;if(leftDepth<=0||rightDepth<=0)return null;
  const dropAtr=leftDepth/atr,recovery=rightDepth/leftDepth,balance=Math.min(leftDepth,rightDepth)/Math.max(leftDepth,rightDepth);
  const neighbourLow=Math.min(rows[index-1].low,rows[index+1].low),sharpness=Math.max(0,(neighbourLow-cur.low)/atr);
  const closeLift=Math.max(0,(cur.close-cur.low)/atr);
  return{time:cur.time,level:cur.low,index,atr,dropAtr,recovery,balance,sharpness,closeLift,leftHigh,rightHigh};
}
function scoreRadarPattern(rows,index,symbol=runtime.symbol){
  const f=radarFeatureAt(rows,index);if(!f)return null;
  const score=20*clamp((f.dropAtr-.6)/2.4,0,1)+30*clamp((f.recovery-.25)/.85,0,1)+20*clamp(f.balance,0,1)+20*clamp(f.sharpness/.9,0,1)+10*clamp(f.closeLift/.7,0,1);
  if(score<clamp(num(store.ui.radar?.minScore,45),25,90))return null;
  const strength=score>=75?'strong':score>=60?'medium':'weak';
  const manualMatch=store.training.manualExamples.some(x=>x.symbol===symbol&&x.interval===runtime.interval&&Math.abs(num(x.selectedCandleTime)-f.time)<=intervalSeconds(runtime.interval)*2);
  return{...f,patternId:`R-${symbol}-${f.time}`,score:Number(score.toFixed(1)),strength,manualMatch};
}
function scanRadar(){
  if(!store.ui.radar?.enabled){runtime.radarCandidates=[];return[];}
  const rows=chartRows(),raw=[];
  for(let i=14;i<rows.length-4;i++){const c=scoreRadarPattern(rows,i);if(c)raw.push(c);}
  const merged=[];
  for(const c of raw){
    const prev=merged.at(-1);
    if(prev&&c.index-prev.index<=3){if(c.score>prev.score)merged[merged.length-1]=c;}
    else merged.push(c);
  }
  runtime.radarCandidates=merged;return merged;
}
function renderRadar(){
  const on=!!store.ui.radar?.enabled,c=runtime.radarCandidates||[],strong=c.filter(x=>x.strength==='strong').length,medium=c.filter(x=>x.strength==='medium').length,weak=c.length-strong-medium;
  els.radarBtn.classList.toggle('active',on);els.radarBtn.textContent=on?'◉':'◎';
  els.radarLegend.classList.toggle('hidden',!on);
  if(on)els.radarLegend.innerHTML=`<b>Радар: ${c.length}</b><span><i class="radar-dot strong"></i>${strong}</span><span><i class="radar-dot medium"></i>${medium}</span><span><i class="radar-dot weak"></i>${weak}</span>`;
}
function toggleRadar(){
  store.ui.radar.enabled=!store.ui.radar.enabled;runtime.radarSelected=null;save();scanRadar();renderRadar();updateMarkers();
  toast(store.ui.radar.enabled?`Радар включён: найдено ${runtime.radarCandidates.length} галок`:'Радар выключен');
}
function radarCandidateColor(c){return c.manualMatch?COLORS.cyan:c.strength==='strong'?COLORS.green:c.strength==='medium'?COLORS.orange:COLORS.gray;}
function onRadarChartClick(param){
  if(!store.ui.radar?.enabled||runtime.tool!=='cursor'||!param?.time||!runtime.radarCandidates.length)return;
  const t=typeof param.time==='number'?param.time:Math.floor(Date.UTC(param.time.year,param.time.month-1,param.time.day)/1000),maxGap=intervalSeconds(runtime.interval)*2;
  let best=null,gap=Infinity;for(const c of runtime.radarCandidates){const d=Math.abs(c.time-t);if(d<gap){gap=d;best=c;}}
  if(!best||gap>maxGap)return;runtime.radarSelected=best;updateMarkers();
  toast(`Галка ${Math.round(best.score)}/100 · падение ${best.dropAtr.toFixed(2)} ATR · возврат ${(best.recovery*100).toFixed(0)}% · плечи ${(best.balance*100).toFixed(0)}%${best.manualMatch?' · совпала с твоим выбором':''}`,'alert');
}
'''
          anchor='/* Galka paper bot */'
          if 'function scoreRadarPattern' not in js:
              js=js.replace(anchor,radar_code+'\n'+anchor)

          old="""  const markers=[],symbol=runtime.symbol,ss=store.paper.symbols[symbol],p=ss.pattern,c=ss.campaign;
  if(p)addPaperLine(p.vLow,p.source==='manual'?COLORS.orange:COLORS.blue,p.source==='manual'?'GALKA':'V-low');"""
          new="""  const markers=[],symbol=runtime.symbol,ss=store.paper.symbols[symbol],p=ss.pattern,c=ss.campaign;
  scanRadar();renderRadar();
  if(store.ui.radar?.enabled){
    for(const r of runtime.radarCandidates)markers.push({time:r.time,position:'belowBar',color:radarCandidateColor(r),shape:r.strength==='strong'?'arrowUp':'circle',text:`G${Math.round(r.score)}${r.manualMatch?'★':''}`});
    if(runtime.radarSelected)addPaperLine(runtime.radarSelected.level,radarCandidateColor(runtime.radarSelected),`RADAR ${Math.round(runtime.radarSelected.score)}`);
  }
  if(p)addPaperLine(p.vLow,p.source==='manual'?COLORS.orange:COLORS.blue,p.source==='manual'?'GALKA':'V-low');"""
          if old not in js: raise SystemExit('updateMarkers anchor not found')
          js=js.replace(old,new)
          js=js.replace("store.training.manualExamples.push({id,symbol,interval:runtime.interval,level:p.price,selectedCandleTime:p.time,selectedAt:nowIso(),status:'active',context});", "store.training.manualExamples.push({id,symbol,interval:runtime.interval,level:p.price,selectedCandleTime:p.time,selectedAt:nowIso(),status:'active',context,features:radarFeatureAt(rows,idx)});")
          js=js.replace("els.themeBtn.onclick=()=>{store.ui.theme=store.ui.theme==='dark'?'light':'dark';save();applyTheme();};", "els.themeBtn.onclick=()=>{store.ui.theme=store.ui.theme==='dark'?'light':'dark';save();applyTheme();};\nels.radarBtn.onclick=toggleRadar;")
          js=js.replace("createMainChart();createOscChart();applyScaleMode();renderIndicatorList();renderAll();resizeCanvas();bootstrap();", "createMainChart();createOscChart();applyScaleMode();renderIndicatorList();renderAll();scanRadar();renderRadar();resizeCanvas();bootstrap();")

          html=html.replace('<button id="fullscreenBtn" title="На весь экран">⛶</button>', '<button class="icon-btn" id="radarBtn" title="Радар галок">◎</button>\n      <button id="fullscreenBtn" title="На весь экран">⛶</button>')
          html=html.replace('<div class="watermark" id="watermark">BTCUSDT · 15m</div>', '<div class="watermark" id="watermark">BTCUSDT · 15m</div>\n          <div class="radar-legend hidden" id="radarLegend"></div>')
          html=html.replace('pro.css?v=4','pro.css?v=5').replace('pro.js?v=4','pro.js?v=5')

          css=css.replace('.top-actions button:not(#indicatorBtn):not(#alertBtn):not(#fullscreenBtn){display:none}', '.top-actions button:not(#indicatorBtn):not(#alertBtn):not(#fullscreenBtn):not(#radarBtn){display:none}')
          radar_css=r'''
.radar-legend{position:absolute;left:10px;top:48px;z-index:7;display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid var(--line2);border-radius:7px;background:color-mix(in srgb,var(--panel) 88%,transparent);font-size:10px;pointer-events:none;box-shadow:0 5px 18px #0005}
.radar-legend span{display:flex;align-items:center;gap:3px;color:var(--muted)}.radar-dot{width:7px;height:7px;border-radius:50%;display:inline-block}.radar-dot.strong{background:var(--green)}.radar-dot.medium{background:var(--orange)}.radar-dot.weak{background:var(--muted)}
#radarBtn.active{background:color-mix(in srgb,var(--green) 22%,var(--panel2))!important;color:#8ff0d8!important;border-color:var(--green)!important}
@media(max-width:700px){.radar-legend{top:38px;left:8px;padding:4px 6px;gap:6px}.top-actions #radarBtn{display:inline-grid!important}}
'''
          if '.radar-legend{' not in css: css += '\n'+radar_css

          anchor_check="  ['no exchange keys', !/api[_-]?key|secret[_-]?key/i.test(js)],"
          radar_checks="  ['Galka radar toggle', /id=\"radarBtn\"/.test(html) && /toggleRadar/.test(js) && /radarLegend/.test(js)],\n  ['explainable Galka radar', /scoreRadarPattern/.test(js) && /dropAtr/.test(js) && /recovery/.test(js) && /balance/.test(js)],\n  ['radar never trades', /highlights candidates only and never opens trades/.test(js)],\n  ['paper storage still preserved', /const STORAGE_KEY = 'galka-pro-v1'/.test(js)],\n"
          if "['Galka radar toggle'" not in check: check=check.replace(anchor_check,radar_checks+anchor_check)

          html_path.write_text(html);css_path.write_text(css);js_path.write_text(js);check_path.write_text(check)
          PY
      - name: Validate terminal
        run: npm run check
      - name: Commit radar
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add terminal/pro.html terminal/pro.css terminal/pro.js scripts/check-pro-terminal.mjs
          git commit -m "Add explainable Galka radar"
          git push
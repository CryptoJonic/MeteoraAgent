name: Finalize Galka Radar
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  finalize:
    if: github.head_ref == 'feat/galka-radar'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Patch live refresh and selection isolation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('terminal/pro.js')
          s=p.read_text()
          s=s.replace("  runtime.radarCandidates=merged;return merged;", "  runtime.radarCandidates=merged;\n  if(runtime.radarSelected&&!merged.some(x=>x.patternId===runtime.radarSelected.patternId))runtime.radarSelected=null;\n  return merged;")
          s=s.replace("        updateCandleMap(s,interval,c);\n        if(interval==='15m'&&k.x){detectLatestPattern(s);processBotQuote(s);}", "        updateCandleMap(s,interval,c);\n        if(interval==='15m'&&k.x){detectLatestPattern(s);processBotQuote(s);}\n        if(k.x&&store.ui.radar?.enabled&&s===runtime.symbol&&interval===runtime.interval)updateMarkers();")
          s=s.replace("function changeSymbol(symbol){\n  runtime.selectedDrawing=null;runtime.symbol=symbol;", "function changeSymbol(symbol){\n  runtime.selectedDrawing=null;runtime.radarSelected=null;runtime.symbol=symbol;")
          s=s.replace("async function changeInterval(interval){\n  runtime.selectedDrawing=null;runtime.interval=interval;", "async function changeInterval(interval){\n  runtime.selectedDrawing=null;runtime.radarSelected=null;runtime.interval=interval;")
          p.write_text(s)
          PY
      - run: npm run check
      - name: Commit final radar fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add terminal/pro.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh radar on closed candles"
          git push origin HEAD:${{ github.head_ref }}
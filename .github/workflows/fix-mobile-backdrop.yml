name: Fix Mobile Backdrop
on:
  push:
    branches: [feat/galka-level-editor-mobile-ui]
    paths:
      - .github/workflows/fix-mobile-backdrop.yml
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Fix backdrop cascade
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('terminal/pro.css')
          s=p.read_text()
          old='.sheet-backdrop{display:block;position:fixed;'
          new='.sheet-backdrop{display:block!important;position:fixed;'
          if s.count(old)!=1: raise SystemExit(f'expected one backdrop rule, got {s.count(old)}')
          p.write_text(s.replace(old,new,1))
          PY
      - name: Validate terminal
        run: npm run check
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal/pro.css
          git diff --cached --quiet || git commit -m "Fix mobile sheet backdrop visibility"
          git push

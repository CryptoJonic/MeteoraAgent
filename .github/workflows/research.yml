name: Galka Historical Replay

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "research/**"
      - ".github/workflows/research.yml"

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: research/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r research/requirements.txt
      - name: Synthetic no-network smoke test
        run: python research/run_candidate.py --synthetic --output research/output/smoke.galka.zip
      - name: Galka Lab unit tests
        run: npm run research:test
      - name: Galka Lab synthetic end-to-end
        run: |
          python research/galka_lab.py \
            --synthetic \
            --synthetic-days 30 \
            --output /tmp/galka-lab-smoke \
            --build-dataset \
            --classify \
            --report \
            --export-terminal-pack
          test -s /tmp/galka-lab-smoke/INTERIM_STATISTICAL_REPORT.md
          test -s /tmp/galka-lab-smoke/galka-stats-v1.json.gz
      - name: Replay selected candidate on Binance history
        run: python research/run_candidate.py
      - name: List results
        run: ls -lh research/output && unzip -t research/output/BTCUSDT_15m_dual_failure_v5.galka.zip
      - uses: actions/upload-artifact@v4
        with:
          name: galka-btc15m-history
          path: |
            research/output/BTCUSDT_15m_dual_failure_v5.galka.zip
          if-no-files-found: error
          retention-days: 30
